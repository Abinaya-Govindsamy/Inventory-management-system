<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Inventory Management System</title>

<link rel="stylesheet" href="style.css">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- QR Scanner -->
<script src="https://unpkg.com/html5-qrcode"></script>

<!-- Barcode Scanner -->
<script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.min.js"></script>

<!-- TensorFlow -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

</head>

<body>

<header>

<h1>
📦 AI Inventory Management System
</h1>

<div class="header-buttons">

<button onclick="toggleDarkMode()">
🌙 Dark Mode
</button>

<button onclick="startVoiceSearch()">
🎤 Voice Search
</button>

</div>

</header>


<div class="container">

<!-- Dashboard -->

<div class="dashboard">

<div class="card">
<h2 id="totalProducts">0</h2>
<p>Total Products</p>
</div>

<div class="card">
<h2 id="stockProducts">0</h2>
<p>In Stock</p>
</div>

<div class="card">
<h2 id="lowProducts">0</h2>
<p>Low Stock</p>
</div>

<div class="card">
<h2 id="inventoryValue">₹0</h2>
<p>Total Value</p>
</div>

</div>


<!-- Search Section -->

<div class="search-section">

<input
type="text"
id="search"
placeholder="🔍 Search Product..."
onkeyup="searchProduct()">

<label for="currency">

Currency

</label>

<select id="currency" onchange="currencyChanged()">

</select>

<button onclick="openAddProduct()">

➕ Add Product

</button>

<button onclick="startQRScanner()">

📷 QR Scan

</button>

<button onclick="startBarcodeScanner()">

🔳 Barcode

</button>

</div>



<!-- AI Image Search -->

<div class="image-search">

<h3>

🖼 Search Product by Image

</h3>

<input
type="file"
id="imageSearch"
accept="image/*">

</div>



<!-- Product Table -->

<div class="table-container">

<table>

<thead>

<tr>

<th>ID</th>

<th>Image</th>

<th>Name</th>

<th>SKU</th>

<th>Category</th>

<th>Quantity</th>

<th>Price</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="productTable">

</tbody>

</table>

</div>
<!-- Add Product Modal -->

<div class="modal" id="productModal">

    <div class="modal-content">

        <h2>Add Product</h2>

        <input
            type="text"
            id="name"
            placeholder="Product Name">

        <input
            type="text"
            id="sku"
            placeholder="SKU">

        <input
            type="text"
            id="category"
            placeholder="Category">

        <input
            type="number"
            id="quantity"
            placeholder="Quantity">

        <input
            type="number"
            id="price"
            placeholder="Price">

        <input
            type="file"
            id="image"
            accept="image/*">

        <div class="buttons">

            <button
                id="saveBtn"
                onclick="saveProduct()">

                Save

            </button>

            <button
                id="cancelBtn"
                onclick="closeModal()">

                Cancel

            </button>

        </div>

    </div>

</div>



<!-- Chatbot -->

<div class="chatbot">

    <button
        class="chat-button"
        onclick="toggleChatbot()">

        🤖

    </button>


    <div
        class="chat-window"
        id="chatWindow">

        <h3>

            AI Inventory Assistant

        </h3>

        <div
            id="messages"
            class="messages">

        </div>


        <input
            type="text"
            id="chatInput"
            placeholder="Ask something...">

        <button onclick="sendMessage()">

            Send

        </button>

    </div>

</div>



<!-- QR Scanner -->

<div
    id="reader"
    style="width:300px; margin:20px auto;">

</div>



<!-- Barcode Scanner -->

<div
    id="barcode-reader"
    style="width:300px; margin:20px auto;">

</div>



<!-- Footer -->

<footer>

    <p>

        © 2026 AI Inventory Management System

    </p>

</footer>

</div>


<!-- JavaScript -->

<script src="script.js"></script>

</body>
</html>
